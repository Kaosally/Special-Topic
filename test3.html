<div class = "section2">
    <svg viewBox="0 0 1320 1100" style = "position: absolute; width: 100%; height: 100%">
        <defs>
            <filter id = "ultra-real-water" x="-20%" y = "-20%" width ="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency = "0.06 0.12" numOctaves = "4" seed = "1" result = "noise1">
                    <animate attributeName = "seed" from = "1" to = "100" dur = "15s" repeatCount = "indefinite" />
                </feTurbulence>
                <feTurbulence type="fractalNoise" baseFrequency = "0.01 0.02" numOctaves = "2" seed = "2" result ="noise2">
                    <animate attributeName = "seed" from = "1" to = "50" dur = "25s" repeatCount = "indefinite" />
                </feTurbulence>
                <feComposite in="noise1" in2="noise2" operator="arithmetic" k1="1.5" k2="0" k3="0" k4="0" result = "mixed-noise"/>
                <feComponentTransfer in="mixed-noise" result ="sharp-noise">
                    <feFuncR type = "discrete" tableValues = "0 0.1 0.4 1" />
                    <feFuncG type = "discrete" tableValues = "0 0.2 0.5 1" />
                    <feFuncB type = "discrete" tableValues = "0 0.4 0.7 1" />
                </feComponentTransfer>
                <feDisplacementMap in="SourceGraphic" in2="sharp-noise" scale = "55" />
            </filter>

            <linearGradient id = "deep-river" x1 = "1" y1 = "0" x2 = "0" y2 = "1">
                <stop offset = "0%" stop-color = "#004d54" stop-opacity = "1" />
                <stop offset = "40%" stop-color = "#006d77" stop-opacity = "0.9" />
                <stop offset = "70%" stop-color = "#83c5be" stop-opacity = "0.5" />
                <stop offset = "100%" stop-color = "#edf6f9" stop-opacity = "0.6" />
            </linearGradient>

            <pattern id="flowing-river" x="0" y = "0" width ="1" height="1200" patternUnits="userSpaceOnUse">
                <rect width = "1920" height = "600" fill = "url(#deep-river)" y = "0" />
                <rect width = "1920" height = "600" fill = "url(#deep-river)" y = "600" />
                <animate attributeName = "y" from = "-600" to = "0" dur="5s" repeatCount ="indefinite" />
            </pattern>
        </defs>

        <path d="M1800 -100 Q1790, 40 1700,50 Q1700,40 1600,400 Q1600,400 1000 700 Q1000,700 800,1200" fill = "none" stroke = "#add8e6" stroke-width ="320" opacity="1" filter = "blur(20px)" />

        <g filter = "url(#ultra-real-water)">
            <path d="M1800 -100 Q1790, 40 1700,50 Q1700,40 1600,400 Q1600,400 1000 700 Q1000,700 800,1200" fill="none" stroke="url(#flowing-river)" stroke-width="300" stroke-linecap ="round" stroke-linejoin="round" />
            <path d="M1800 -100 Q1790, 40 1700,50 Q1700,40 1600,400 Q1600,400 1000 700 Q1000,700 800,1200" fill = "none" stroke="white" stroke-width="220" stroke-linecap ="round" stroke-linejoin="round" style="mix-blend-mode:color-dodge" opacity="0.45"/>
        </g>

        <circle r="2" fill="white" opacity="0.6">
            <animateMotion path="M1800 -100 Q1790, 40 1700,50 Q1700,40 1600,400 Q1600,400 1000 700 Q1000,700 800,1200" dur="3s" repeatCount="indefinite"/>
        </circle>
    </svg>
</div>

<linearGradient id="deep-river-unit" x1="1" y1="0" x2="0" y2="1">

                <!-- 每個 <stop> 代表漸層中的一個「顏色點」。offset 決定它在漸層的位置（0% ~ 100%）、stop-color 是顏色、stop-opacity 是透明度 -->

                <!-- 在 SVG 漸層裡，stop-opacity 不只是透明/不透明，視覺上就是控制「亮度感」或「光線強度」。-->

                <stop offset="0%" stop-color="#004d54" stop-opacity="1" />

                <stop offset="40%" stop-color="#006d77" stop-opacity="0.9" />

                <stop offset="70%" stop-color="#83c5be" stop-opacity="0.5" />

                <stop offset="100%" stop-color="#edf6f9" stop-opacity="0.6" />

            </linearGradient>
